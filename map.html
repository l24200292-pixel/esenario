<!DOCTYPE html>
<html lang="en">
<head>
    <title>three.js webgl - map controls</title>
    <meta charset="utf-8">
    <style>
        body { background-color: #ccc; color: #000; margin: 0; overflow: hidden; }
        #info { position: absolute; top: 10px; width: 100%; text-align: center; }
        a { color: #f00; }
    </style>
</head>
<body>
    <div id="info">
        <a href="https://threejs.org" target="_blank" rel="noopener">three.js</a> - map controls
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GUI } from 'three/addons/libs/lil-gui.module.min.js';
        import { MapControls } from 'three/addons/controls/MapControls.js';

        let camera, controls, scene, renderer;

        init();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color( 0xcccccc );
            scene.fog = new THREE.FogExp2( 0xcccccc, 0.002 );

            renderer = new THREE.WebGLRenderer( { antialias: true } );
            renderer.setPixelRatio( window.devicePixelRatio );
            renderer.setSize( window.innerWidth, window.innerHeight );
            renderer.setAnimationLoop( animate );
            document.body.appendChild( renderer.domElement );

            camera = new THREE.PerspectiveCamera( 60, window.innerWidth / window.innerHeight, 1, 1000 );
            camera.position.set( 0, 200, - 200 );

            controls = new MapControls( camera, renderer.domElement );
            controls.enableDamping = true; 
            controls.dampingFactor = 0.05;
            controls.screenSpacePanning = false;
            controls.minDistance = 100;
            controls.maxDistance = 500;
            controls.maxPolarAngle = Math.PI / 2;

            // world
            const geometry = new THREE.BoxGeometry();
            geometry.translate( 0, 0.5, 0 );
            const material = new THREE.MeshPhongMaterial( { color: 0xeeeeee, flatShading: true } );
            const mesh = new THREE.InstancedMesh( geometry, material, 500 );
            const dummy = new THREE.Object3D();

            for ( let i = 0; i < 500; i ++ ) {
                dummy.position.x = Math.random() * 1600 - 800;
                dummy.position.z = Math.random() * 1600 - 800;
                dummy.scale.x = 20;
                dummy.scale.y = Math.random() * 80 + 10;
                dummy.scale.z = 20;
                dummy.updateMatrix();
                mesh.setMatrixAt( i, dummy.matrix );
            }
            scene.add( mesh );

            // lights
            const dirLight1 = new THREE.DirectionalLight( 0xffffff, 3 );
            dirLight1.position.set( 1, 1, 1 );
            scene.add( dirLight1 );

            const dirLight2 = new THREE.DirectionalLight( 0x002288, 3 );
            dirLight2.position.set( - 1, - 1, - 1 );
            scene.add( dirLight2 );

            const ambientLight = new THREE.AmbientLight( 0x555555 );
            scene.add( ambientLight );

            window.addEventListener( 'resize', onWindowResize );

            const gui = new GUI();
            gui.add( controls, 'zoomToCursor' );
            gui.add( controls, 'screenSpacePanning' );
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize( window.innerWidth, window.innerHeight );
        }

        function animate() {
            controls.update();
            renderer.render( scene, camera );
        }
    </script>
</body>
</html>
