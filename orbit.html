<!DOCTYPE html>
<html lang="en">
<head>
    <title>three.js webgl - orbit controls</title>
    <meta charset="utf-8">
    <style>
        body { margin: 0; background-color: #ccc; color: #000; overflow: hidden; }
        #info { position: absolute; top: 0px; width: 100%; text-align: center; }
    </style>
</head>
<body>
    <div id="info"><a href="https://threejs.org" target="_blank" rel="noopener">three.js</a> - orbit controls</div>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let camera, controls, scene, renderer;

        init();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color( 0xcccccc );
            scene.fog = new THREE.FogExp2( 0xcccccc, 0.002 );

            renderer = new THREE.WebGLRenderer( { antialias: true } );
            renderer.setPixelRatio( window.devicePixelRatio );
            renderer.setSize( window.innerWidth, window.innerHeight );
            document.body.appendChild( renderer.domElement );

            camera = new THREE.PerspectiveCamera( 60, window.innerWidth / window.innerHeight, 1, 1000 );
            camera.position.set( 400, 200, 0 );

            controls = new OrbitControls( camera, renderer.domElement );
            controls.listenToKeyEvents( window ); 
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            // world
            const geometry = new THREE.CylinderGeometry( 0, 10, 30, 4, 1 );
            const material = new THREE.MeshPhongMaterial( { color: 0xffffff, flatShading: true } );
            for ( let i = 0; i < 500; i ++ ) {
                const mesh = new THREE.Mesh( geometry, material );
                mesh.position.x = Math.random() * 1600 - 800;
                mesh.position.y = 0;
                mesh.position.z = Math.random() * 1600 - 800;
                mesh.updateMatrix();
                mesh.matrixAutoUpdate = false;
                scene.add( mesh );
            }

            // lights
            const dirLight1 = new THREE.DirectionalLight( 0xffffff, 3 );
            dirLight1.position.set( 1, 1, 1 );
            scene.add( dirLight1 );
            const ambientLight = new THREE.AmbientLight( 0x555555 );
            scene.add( ambientLight );

            window.addEventListener( 'resize', onWindowResize );
            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize( window.innerWidth, window.innerHeight );
        }

        function animate() {
            requestAnimationFrame( animate );
            controls.update();
            renderer.render( scene, camera );
        }
    </script>
</body>
</html>
