<!DOCTYPE html>
<html>
<head>
    <title>three.js webgl - geometry - minecraft</title>
    <meta charset="utf-8">
    <style>
        body { background-color: #bfd1e5; margin: 0; overflow: hidden; font-family: sans-serif; }
        #info { position: absolute; top: 10px; width: 100%; text-align: center; color: #61443e; }
    </style>
</head>
<body>
    <div id="info">three.js - minecraft demo<br />(Click Izquierdo: Adelante, Click Derecho: Atrás)</div>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { FirstPersonControls } from 'three/addons/controls/FirstPersonControls.js';
        import { ImprovedNoise } from 'three/addons/math/ImprovedNoise.js';
        import * as BufferGeometryUtils from 'three/addons/utils/BufferGeometryUtils.js';

        let camera, controls, scene, renderer;
        const worldWidth = 128, worldDepth = 128;
        const worldHalfWidth = worldWidth / 2, worldHalfDepth = worldDepth / 2;
        const data = generateHeight( worldWidth, worldDepth );

        init();
        animate();

        function init() {
            camera = new THREE.PerspectiveCamera( 60, window.innerWidth / window.innerHeight, 1, 20000 );
            scene = new THREE.Scene();
            scene.background = new THREE.Color( 0xbfd1e5 );

            const matrix = new THREE.Matrix4();
            const pxGeometry = new THREE.PlaneGeometry( 100, 100 );
            pxGeometry.attributes.uv.array[ 1 ] = 0.5; pxGeometry.attributes.uv.array[ 3 ] = 0.5;
            pxGeometry.rotateY( Math.PI / 2 ); pxGeometry.translate( 50, 0, 0 );

            const nxGeometry = new THREE.PlaneGeometry( 100, 100 );
            nxGeometry.attributes.uv.array[ 1 ] = 0.5; nxGeometry.attributes.uv.array[ 3 ] = 0.5;
            nxGeometry.rotateY( - Math.PI / 2 ); nxGeometry.translate( - 50, 0, 0 );

            const pyGeometry = new THREE.PlaneGeometry( 100, 100 );
            pyGeometry.attributes.uv.array[ 5 ] = 0.5; pyGeometry.attributes.uv.array[ 7 ] = 0.5;
            pyGeometry.rotateX( - Math.PI / 2 ); pyGeometry.translate( 0, 50, 0 );

            const pzGeometry = new THREE.PlaneGeometry( 100, 100 );
            pzGeometry.attributes.uv.array[ 1 ] = 0.5; pzGeometry.attributes.uv.array[ 3 ] = 0.5;
            pzGeometry.translate( 0, 0, 50 );

            const nzGeometry = new THREE.PlaneGeometry( 100, 100 );
            nzGeometry.attributes.uv.array[ 1 ] = 0.5; nzGeometry.attributes.uv.array[ 3 ] = 0.5;
            nzGeometry.rotateY( Math.PI ); nzGeometry.translate( 0, 0, - 50 );

            const geometries = [];
            for ( let z = 0; z < worldDepth; z ++ ) {
                for ( let x = 0; x < worldWidth; x ++ ) {
                    const h = getY( x, z );
                    matrix.makeTranslation( x * 100 - worldHalfWidth * 100, h * 100, z * 100 - worldHalfDepth * 100 );
                    geometries.push( pyGeometry.clone().applyMatrix4( matrix ) );
                    if ( ( getY( x + 1, z ) !== h ) || x === 0 ) geometries.push( pxGeometry.clone().applyMatrix4( matrix ) );
                    if ( ( getY( x - 1, z ) !== h ) || x === worldWidth - 1 ) geometries.push( nxGeometry.clone().applyMatrix4( matrix ) );
                    if ( ( getY( x, z + 1 ) !== h ) || z === worldDepth - 1 ) geometries.push( pzGeometry.clone().applyMatrix4( matrix ) );
                    if ( ( getY( x, z - 1 ) !== h ) || z === 0 ) geometries.push( nzGeometry.clone().applyMatrix4( matrix ) );
                }
            }

            const geometry = BufferGeometryUtils.mergeGeometries( geometries );
            const loader = new THREE.TextureLoader();
            // URL DE TEXTURA ORIGINAL
            const texture = loader.load( 'https://raw.githack.com/mrdoob/three.js/master/examples/textures/minecraft/atlas.png' );
            texture.magFilter = THREE.NearestFilter;

            const mesh = new THREE.Mesh( geometry, new THREE.MeshLambertMaterial( { map: texture } ) );
            scene.add( mesh );
            scene.add( new THREE.AmbientLight( 0xeeeeee, 3 ) );

            renderer = new THREE.WebGLRenderer( { antialias: true } );
            renderer.setPixelRatio( window.devicePixelRatio );
            renderer.setSize( window.innerWidth, window.innerHeight );
            document.body.appendChild( renderer.domElement );

            controls = new FirstPersonControls( camera, renderer.domElement );
            controls.movementSpeed = 1000;
            controls.lookSpeed = 0.125;
            camera.position.y = getY( worldHalfWidth, worldHalfDepth ) * 100 + 100;
        }

        function generateHeight( width, height ) {
            const data = [], perlin = new ImprovedNoise(), size = width * height, z = Math.random() * 100;
            let quality = 2;
            for ( let j = 0; j < 4; j ++ ) {
                for ( let i = 0; i < size; i ++ ) {
                    const x = i % width, y = ( i / width ) | 0;
                    if(j===0) data[i]=0;
                    data[ i ] += perlin.noise( x / quality, y / quality, z ) * quality;
                }
                quality *= 4;
            }
            return data;
        }

        function getY( x, z ) { return ( data[ x + z * worldWidth ] * 0.15 ) | 0; }

        function animate() {
            requestAnimationFrame( animate );
            controls.update( 0.01 );
            renderer.render( scene, camera );
        }
    </script>
</body>
</html>
