<!DOCTYPE html>
<html lang="es">
<head>
    <title>three.js - pointerlock controls</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <style>
        body { margin: 0; background-color: #000; font-family: sans-serif; overflow: hidden; }
        #blocker {
            position: absolute; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.7);
            display: flex; justify-content: center; align-items: center; z-index: 100;
        }
        #instructions {
            text-align: center; color: #ffffff; cursor: pointer; padding: 20px;
            border: 2px solid #00fffb; border-radius: 10px; background: rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div id="blocker">
        <div id="instructions">
            <p style="font-size:40px; font-weight:bold; color:#00fffb;">CLICK PARA MOVER</p>
            <p>Usa <b>WASD</b> para caminar y <b>ESPACIO</b> para saltar</p>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        let camera, scene, renderer, controls;
        const objects = [];
        let raycaster;

        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false, canJump = false;
        let prevTime = performance.now();
        const velocity = new THREE.Vector3(), direction = new THREE.Vector3();
        const color = new THREE.Color();

        init();

        function init() {
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.y = 10;

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffffff);
            scene.fog = new THREE.Fog(0xffffff, 0, 750);

            const light = new THREE.HemisphereLight(0xeeeeff, 0x777788, 3);
            scene.add(light);

            controls = new PointerLockControls(camera, document.body);

            const blocker = document.getElementById('blocker');
            blocker.addEventListener('click', () => controls.lock());
            controls.addEventListener('lock', () => blocker.style.display = 'none');
            controls.addEventListener('unlock', () => blocker.style.display = 'flex');

            scene.add(controls.getObject());

            // EVENTOS DE TECLADO MEJORADOS
            const onKeyDown = (e) => {
                switch (e.code) {
                    case 'KeyW': case 'ArrowUp': moveForward = true; break;
                    case 'KeyA': case 'ArrowLeft': moveLeft = true; break;
                    case 'KeyS': case 'ArrowDown': moveBackward = true; break;
                    case 'KeyD': case 'ArrowRight': moveRight = true; break;
                    case 'Space': if (canJump) velocity.y += 300; canJump = false; break;
                }
            };
            const onKeyUp = (e) => {
                switch (e.code) {
                    case 'KeyW': case 'ArrowUp': moveForward = false; break;
                    case 'KeyA': case 'ArrowLeft': moveLeft = false; break;
                    case 'KeyS': case 'ArrowDown': moveBackward = false; break;
                    case 'KeyD': case 'ArrowRight': moveRight = false; break;
                }
            };
            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);

            raycaster = new THREE.Raycaster(new THREE.Vector3(), new THREE.Vector3(0, -1, 0), 0, 10);

            // SUELO
            let floorGeometry = new THREE.PlaneGeometry(2000, 2000, 100, 100).rotateX(-Math.PI / 2);
            floorGeometry = floorGeometry.toNonIndexed();
            const floorColors = [];
            for (let i = 0; i < floorGeometry.attributes.position.count; i++) {
                color.setHSL(Math.random() * 0.3 + 0.5, 0.75, Math.random() * 0.25 + 0.75, THREE.SRGBColorSpace);
                floorColors.push(color.r, color.g, color.b);
            }
            floorGeometry.setAttribute('color', new THREE.Float32BufferAttribute(floorColors, 3));
            scene.add(new THREE.Mesh(floorGeometry, new THREE.MeshBasicMaterial({ vertexColors: true })));

            // CUBOS
            const boxGeometry = new THREE.BoxGeometry(20, 20, 20).toNonIndexed();
            for (let i = 0; i < 400; i++) {
                const boxColors = [];
                for(let j=0; j<boxGeometry.attributes.position.count; j++) {
                    color.setHSL(Math.random() * 0.3 + 0.5, 0.75, Math.random() * 0.25 + 0.75, THREE.SRGBColorSpace);
                    boxColors.push(color.r, color.g, color.b);
                }
                const tempGeom = boxGeometry.clone();
                tempGeom.setAttribute('color', new THREE.Float32BufferAttribute(boxColors, 3));
                const boxMaterial = new THREE.MeshPhongMaterial({ specular: 0xffffff, flatShading: true, vertexColors: true });
                const box = new THREE.Mesh(tempGeom, boxMaterial);
                box.position.set(Math.floor(Math.random() * 20 - 10) * 20, 10, Math.floor(Math.random() * 20 - 10) * 20);
                scene.add(box);
                objects.push(box);
            }

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            
            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now();
            
            if (controls.isLocked) {
                const delta = (time - prevTime) / 1000;

                // Fricción para que no se deslice infinitamente
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;
                velocity.y -= 9.8 * 100.0 * delta; // Gravedad

                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize();

                if (moveForward || moveBackward) velocity.z -= direction.z * 400.0 * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * 400.0 * delta;

                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);

                controls.getObject().position.y += (velocity.y * delta);

                // No caerse del suelo
                if (controls.getObject().position.y < 10) {
                    velocity.y = 0;
                    controls.getObject().position.y = 10;
                    canJump = true;
                }
            }
            prevTime = time;
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
