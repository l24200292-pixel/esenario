<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #instructions {
            position: absolute; width: 100%; height: 100%; display: flex;
            flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.8); color: white; cursor: pointer; z-index: 10;
        }
    </style>
</head>
<body>
    <div id="instructions">
        <h1 style="color:#00fffb">CLICK AQUÍ PARA JUGAR</h1>
        <p>Mover: WASD | Saltar: ESPACIO | Salir: ESC</p>
    </div>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);
        scene.fog = new THREE.Fog(0xffffff, 0, 750);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 1000);
        camera.position.y = 10;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new PointerLockControls(camera, document.body);
        const ins = document.getElementById('instructions');

        ins.addEventListener('click', () => controls.lock());
        controls.addEventListener('lock', () => ins.style.display = 'none');
        controls.addEventListener('unlock', () => ins.style.display = 'flex');

        scene.add(new THREE.HemisphereLight(0xeeeeff, 0x777788, 2.5));
        scene.add(new THREE.GridHelper(2000, 100, 0x000000, 0xcccccc));

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
