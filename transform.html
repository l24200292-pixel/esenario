<!DOCTYPE html>
<html lang="es">
<head>
    <title>three.js webgl - transform controls</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <style>
        body { margin: 0; background-color: #000; color: #fff; font-family: monospace; overflow: hidden; }
        #info { position: absolute; top: 10px; width: 100%; text-align: center; z-index: 100; pointer-events: none; text-shadow: 1px 1px 2px black; }
        b { color: #00fffb; }
    </style>
</head>
<body>

    <div id="info">
        <b>"W"</b> mover | <b>"E"</b> rotar | <b>"R"</b> escalar | <b>"Q"</b> local/world<br />
        <b>"+/-"</b> tamaño | <b>"X,Y,Z"</b> ocultar ejes | <b>"Esc"</b> reset<br />
        <b>"C"</b> cámara | <b>"V"</b> zoom random | <b>"Space"</b> habilitar
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { TransformControls } from 'three/addons/controls/TransformControls.js';

        let cameraPersp, cameraOrtho, currentCamera;
        let scene, renderer, control, orbit;

        init();

        function init() {
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const aspect = window.innerWidth / window.innerHeight;
            const frustumSize = 5;

            cameraPersp = new THREE.PerspectiveCamera(50, aspect, 0.1, 100);
            cameraOrtho = new THREE.OrthographicCamera(-frustumSize * aspect, frustumSize * aspect, frustumSize, -frustumSize, 0.1, 100);
            currentCamera = cameraPersp;
            currentCamera.position.set(5, 2.5, 5);

            scene = new THREE.Scene();
            scene.add(new THREE.GridHelper(5, 10, 0x888888, 0x444444));

            scene.add(new THREE.AmbientLight(0xffffff, 1));
            const light = new THREE.DirectionalLight(0xffffff, 3);
            light.position.set(1, 1, 1);
            scene.add(light);

            // Carga de textura desde servidor externo para que no falle
            const texture = new THREE.TextureLoader().load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/crate.gif', render);
            texture.colorSpace = THREE.SRGBColorSpace;

            const geometry = new THREE.BoxGeometry();
            const material = new THREE.MeshLambertMaterial({ map: texture });

            orbit = new OrbitControls(currentCamera, renderer.domElement);
            orbit.update();
            orbit.addEventListener('change', render);

            control = new TransformControls(currentCamera, renderer.domElement);
            control.setMode('translate'); // Forzamos flechas al inicio
            control.addEventListener('change', render);
            control.addEventListener('dragging-changed', (event) => {
                orbit.enabled = !event.value;
            });

            const mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);

            control.attach(mesh);
            scene.add(control.getHelper());

            window.addEventListener('resize', onWindowResize);

            window.addEventListener('keydown', function (event) {
                switch (event.key.toLowerCase()) {
                    case 'q': control.setSpace(control.space === 'local' ? 'world' : 'local'); break;
                    case 'shift':
                        control.setTranslationSnap(1);
                        control.setRotationSnap(THREE.MathUtils.degToRad(15));
                        control.setScaleSnap(0.25);
                        break;
                    case 'w': control.setMode('translate'); break;
                    case 'e': control.setMode('rotate'); break;
                    case 'r': control.setMode('scale'); break;
                    case 'c':
                        const position = currentCamera.position.clone();
                        currentCamera = currentCamera.isPerspectiveCamera ? cameraOrtho : cameraPersp;
                        currentCamera.position.copy(position);
                        orbit.object = currentCamera;
                        control.camera = currentCamera;
                        currentCamera.lookAt(orbit.target.x, orbit.target.y, orbit.target.z);
                        onWindowResize();
                        break;
                    case 'v':
                        const randomFoV = Math.random() + 0.1;
                        const randomZoom = Math.random() + 0.1;
                        cameraPersp.fov = randomFoV * 160;
                        cameraOrtho.bottom = -randomFoV * 500;
                        cameraOrtho.top = randomFoV * 500;
                        cameraPersp.zoom = randomZoom * 5;
                        cameraOrtho.zoom = randomZoom * 5;
                        onWindowResize();
                        break;
                    case '+': case '=': control.setSize(control.size + 0.1); break;
                    case '-': case '_': control.setSize(Math.max(control.size - 0.1, 0.1)); break;
                    case 'x': control.showX = !control.showX; break;
                    case 'y': control.showY = !control.showY; break;
                    case 'z': control.showZ = !control.showZ; break;
                    case ' ': control.enabled = !control.enabled; break;
                    case 'escape': control.reset(); break;
                }
                render();
            });

            window.addEventListener('keyup', function (event) {
                if (event.key === 'Shift') {
                    control.setTranslationSnap(null);
                    control.setRotationSnap(null);
                    control.setScaleSnap(null);
                }
            });
            
            render(); // Render inicial
        }

        function onWindowResize() {
            const aspect = window.innerWidth / window.innerHeight;
            cameraPersp.aspect = aspect;
            cameraPersp.updateProjectionMatrix();
            cameraOrtho.left = cameraOrtho.bottom * aspect;
            cameraOrtho.right = cameraOrtho.top * aspect;
            cameraOrtho.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            render();
        }

        function render() {
            renderer.render(scene, currentCamera);
        }
    </script>
</body>
</html>
